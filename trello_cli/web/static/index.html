<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trellno</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <h1>Trellno</h1>
    <nav id="board-nav" class="board-nav" aria-label="Starred boards"></nav>
    <span id="status" class="status"></span>
    <button id="star-toggle" type="button" class="star-toggle" aria-pressed="false" aria-label="Toggle star for current board"></button>
    <select id="board-picker" aria-label="Select board"></select>
    <button id="manage-boards-btn" type="button" class="manage-btn" title="Manage boards" aria-label="Manage boards">⚙</button>
  </header>

  <main id="board" class="board"></main>

  <div id="overlay" class="overlay hidden"></div>
  <aside id="detail" class="detail hidden" aria-label="Card detail"></aside>

  <script src="/static/vendor/Sortable.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
